site_name: aku-utils
repo_url: https://github.com/stsibikov/aku-utils
site_url: https://stsibikov.github.io/aku-utils
site_description: data utils
site_author: Sergei Tsibikov
edit_uri: edit/main/docs/
repo_name: stsibikov/aku-utils
copyright: Maintained by <a href="https://stsibikov.com">stsibikov</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/aku_utils"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stsibikov/aku-utils
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aku-utils

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
